<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý DATN-2026</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="odoo-wrapper" id="main-content">
        <aside class="odoo-sidebar">
            <div class="logo" title="Odoo Home">O</div>
            <nav class="side-nav">
                <div class="app-icon active" id="icon-project" title="Dự án" onclick="showTab('project')">📅</div>
                <div class="app-icon" id="icon-members" title="Thành viên" onclick="showTab('members')">👥</div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="breadcrumb">
                    <span>Dự án</span> / <strong id="breadcrumb-name">Quản lý Task Nhóm 4</strong>
                </div>
                <div class="top-bar-actions" style="display: flex; align-items: center; gap: 15px;">
                    <span class="status-indicator">● Trực tuyến</span>
                    <div id="auth-buttons">
                        </div>
                </div>
            </header>

            <div id="project-view">
                <section class="task-form-area">
                    <div class="form-container">
                        <div class="input-group">
                            <label for="taskTitle">Nội dung công việc</label>
                            <input type="text" id="taskTitle" placeholder="Ví dụ: Thiết kế Database...">
                        </div>
                        
                        <div class="input-group">
                            <label for="taskUser">Người thực hiện</label>
                            <select id="taskUser">
                                <option value="Ngọc Bích">Ngọc Bích</option>
                                <option value="Diệu Hân">Diệu Hân</option>
                                <option value="Trọng Tuấn">Trọng Tuấn</option>
                                <option value="Anh Khoa">Anh Khoa</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="taskDeadline">Hạn chót</label>
                            <input type="date" id="taskDeadline">
                        </div>

                        <button class="btn-primary" onclick="addTask()">
                            <span>+</span> Giao Task
                        </button>
                    </div>
                </section>

                <div class="kanban-board">
                    <div class="kanban-column" id="todo">
                        <div class="column-header"><span class="dot" style="background: #714B67;"></span>Mới</div>
                        <div class="task-list"></div>
                    </div>
                    <div class="kanban-column" id="doing">
                        <div class="column-header"><span class="dot" style="background: #00A09D;"></span>Đang thực hiện</div>
                        <div class="task-list"></div>
                    </div>
                    <div class="kanban-column" id="review">
                        <div class="column-header"><span class="dot" style="background: #F0AD4E;"></span>Chờ kiểm thử</div>
                        <div class="task-list"></div>
                    </div>
                    <div class="kanban-column" id="done">
                        <div class="column-header"><span class="dot" style="background: #5CB85C;"></span>Hoàn thành</div>
                        <div class="task-list"></div>
                    </div>
                </div>
            </div>

            <div id="members-view" style="display: none; padding: 30px;">
                <h2 style="margin-bottom: 25px; color: #0f172a;">Đội ngũ phát triển - Nhóm 4</h2>
                <div class="member-grid" id="member-list">
                    </div>
            </div>
        </main>
    </div>

    <div id="proof-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Nộp minh chứng công việc</h3>
            <p style="font-size:12px; color:gray;">Chọn một hoặc nhiều ảnh minh chứng</p>
            
            <input type="file" id="proof-input" accept="image/*" multiple style="margin: 15px 0; width: 100%;">
            
            <div id="preview-container" style="display:flex; gap:5px; margin-bottom:15px; flex-wrap:wrap;"></div>

            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button onclick="closeProofModal()">Hủy</button>
                <button id="confirm-proof-btn" class="btn-primary">Xác nhận nộp</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
